# Recyclarr — syncs TRaSH Guides quality profiles to Radarr/Sonarr
# Docs: https://recyclarr.dev/wiki/
# After first run, get API keys from each app's Settings > General > API Key

radarr:
  movies:
    base_url: http://radarr:7878
    api_key: !env_var RADARR_API_KEY

    quality_definition:
      type: movie

    quality_profiles:
      - name: Any
        reset_unmatched_scores:
          enabled: true

    custom_formats:
      - trash_ids:
          # HD Bluray + WEB
          - ed38b889b31be83fda192888e2286d83  # BR-DISK
          - 90cedc1fea7ea5d11298bebd3d1d3223  # EVO (no WEBDL)
          - 90a6f9a284dff5103f6346090e6280c8  # LQ
          - b8cd450cbfa689c0259571ae4dc9894d  # 3D
          - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5  # No-RlsGroup
          - 7357cf5161efbf8c4d5d0c30b4815ee2  # Obfuscated
          - 5c44f52a8714fdd79bb4d98e2673be1f  # Retags
        assign_scores_to:
          - name: Any

sonarr:
  tv:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY

    quality_definition:
      type: series

    quality_profiles:
      - name: Any
        reset_unmatched_scores:
          enabled: true

    custom_formats:
      - trash_ids:
          - 85c61753df5b1fb0f12f7c215f750f03  # BR-DISK
          - 9c11cd3f07101cdba90a2d81cf0e56b4  # LQ
          - 47435ece6b99a0b477caf360e79ba0bb  # x265 (HD)
          - fbcb31d8f2f3a5a59e7c7a78e1e7be72  # No-RlsGroup
          - 15a05bc7c1a36e2b57fd628f8e2f9b8f  # Obfuscated
        assign_scores_to:
          - name: Any
